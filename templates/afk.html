{% extends "base.html" %}

{% block title %}AFK режим{% endblock %}
{% block page_title %}AFK режим{% endblock %}
{% block page_subtitle %}Настройки автоматических действий{% endblock %}

{% block content %}

<style>
/* ============================= */
/*  AFK SETTINGS — PREMIUM UI    */
/* ============================= */

.afk-card {
    max-width: 640px;
    margin: 0 auto;
    padding: 20px;
    border-radius: 18px;

    background: var(--card-bg);
    border: 1px solid var(--card-border);
    box-shadow: var(--card-shadow);
}

/* ===== ROW ===== */

.afk-row {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 14px;
    align-items: center;
    margin-bottom: 16px;
}

.afk-row label {
    font-weight: 700;
    letter-spacing: .3px;
    opacity: .85;
}

/* ===== INPUT ===== */

.afk-row input {
    width: 100%;
    padding: 11px 14px;
    border-radius: 12px;

    font-size: 14px;
    font-weight: 600;

    background: var(--input-bg);
    color: var(--text-color);
    border: 1px solid var(--input-border);

    transition: border-color .15s ease, box-shadow .15s ease;
}

.afk-row input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
}

/* ===== TOGGLE ===== */

.afk-toggle {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
}

.afk-status {
    font-size: 14px;
    font-weight: 800;
}

.afk-status.enabled {
    color: var(--accent);
}

.afk-status.disabled {
    opacity: .5;
}

/* ===== ACTIONS ===== */

.afk-actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-top: 22px;
}

/* ===== BUTTONS ===== */

.btn {
    height: 40px;
    padding: 0 18px;

    display: inline-flex;
    align-items: center;
    gap: 8px;

    border-radius: 12px;
    border: none;
    cursor: pointer;

    font-size: 14px;
    font-weight: 800;
}

.btn-primary {
    color: var(--btn-text);
    background: linear-gradient(
        135deg,
        var(--accent),
        var(--accent-strong)
    );

    box-shadow:
        0 10px 28px rgba(0,0,0,.35),
        inset 0 0 0 1px rgba(255,255,255,.12);
}

.btn-secondary {
    background: var(--input-bg);
    color: var(--text-color);
    border: 1px solid var(--input-border);
}

.btn:hover {
    transform: translateY(-1px);
}

.btn:active {
    transform: translateY(0);
}

/* ============================= */
/*  THEME TOKENS                 */
/* ============================= */

:root {
    --accent: #38bdf8;
    --accent-strong: #0284c7;
    --accent-soft: rgba(56,189,248,.25);
}

/* DARK */
[data-theme="dark"] {
    --card-bg: rgba(20,20,22,.85);
    --card-border: rgba(255,255,255,.12);
    --card-shadow: 0 22px 48px rgba(0,0,0,.65);

    --input-bg: #1f1f1f;
    --input-border: #333;

    --text-color: #ffffff;
    --btn-text: #082f49;
}

/* LIGHT */
[data-theme="light"] {
    --card-bg: #ffffff;
    --card-border: #e5e7eb;
    --card-shadow: 0 14px 34px rgba(0,0,0,.12);

    --input-bg: #f9fafb;
    --input-border: #d1d5db;

    --text-color: #111827;
    --btn-text: #082f49;
}
</style>

<div class="afk-card">

    <!-- STATUS -->
    <div class="afk-toggle">
        <div id="afkStatus"
             class="afk-status {{ 'enabled' if afk_enabled else 'disabled' }}">
            {{ '🟡 AFK включён' if afk_enabled else '🟢 AFK выключен' }}
        </div>

        <button class="btn btn-secondary" onclick="toggleAFK()">
            🔁 Переключить
        </button>
    </div>

    <!-- SETTINGS -->
    <form method="post" action="{{ url_for('afk.afk_update_settings') }}">
        <div class="afk-row">
            <label>WS при включении</label>
            <input
                type="text"
                name="ws_on_enable"
                value="{{ settings.ws_on_enable }}"
            >
        </div>

        <div class="afk-row">
            <label>WS при выключении</label>
            <input
                type="text"
                name="ws_on_disable"
                value="{{ settings.ws_on_disable }}"
            >
        </div>

    <!-- 🔽 Макс. очередь чата -->
    <div class="afk-row">
        <label>Макс. очередь чата</label>
        <input
            type="number"
            name="max_queue"
            min="1"
            max="50"
            step="1"
            value="{{ settings.max_queue }}"
        >
    </div>

        <!-- 🔽 AFK ВСТУПИТЕЛЬНАЯ ФРАЗА -->
<div class="afk-row">
    <label>AFK вступительная фраза</label>
    <input
        type="text"
        name="afk_intro_text"
        placeholder="Что будет озвучено при входе в AFK…"
        value="{{ settings.afk_intro_text }}"
    >
</div>


    <div class="afk-actions">
        <button class="btn btn-primary">
            💾 Сохранить
        </button>
    </div>
</form>

</div>

<script>
function toggleAFK() {
    fetch("{{ url_for('afk.afk_toggle') }}", { method: "POST" })
        .then(() => location.reload());
}
</script>

{% endblock %}
