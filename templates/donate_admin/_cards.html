{% if donations %}
    {% for d in donations %}
    <div class="donation-item">

        <div class="donation-header">
            <span class="username">{{ d.username }}</span>

            {% if d.amount and d.amount > 0 %}
                <span class="amount">{{ d.amount }} ₽</span>
            {% endif %}

            <span class="date">
                {{ d.created_at[8:10] }}.{{ d.created_at[5:7] }}.{{ d.created_at[0:4] }}
                {{ d.created_at[11:16] }}
            </span>

            <form method="post"
                  action="{{ url_for('donate_admin.repeat_donate', donate_id=d.id) }}"
                  class="repeat-form">
                <button class="btn-repeat-inline">
                    🔁 Повторить
                </button>
            </form>
        </div>

        <div class="donation-message">
            {{ d.message }}
        </div>

    </div>
    {% endfor %}
{% else %}
    <div class="no-donations">
        📭 Донатов пока нет
    </div>
{% endif %}
