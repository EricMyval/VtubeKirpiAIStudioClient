<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>

<meta charset="utf-8">
<title>Donate Panel</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/glass-ui.css') }}">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/layout.css') }}">

<style>

/* OBS PANEL */

body{
    padding:12px;
}

.panel{
    max-width:900px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.donation-list{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.donation-message{
    margin-top:8px;
    opacity:.85;
    word-break:break-word;
}

/* PLAYING DONATE */

.donation-item.playing{
    border:1px solid rgba(34,197,94,.6);
    box-shadow:
        0 0 0 2px rgba(34,197,94,.25),
        0 10px 30px rgba(34,197,94,.15);
    transition:all .25s ease;
}

.donation-item.playing .username{
    color:#4ade80;
}

.donation-item.playing .tw-card-body{
    background:rgba(34,197,94,.05);
}

/* LINKS */

.donation-message a{
    color:#93c5fd;
    text-decoration:underline;
    word-break:break-word;
}

.donation-message a:hover{
    color:#bfdbfe;
}

.donation-message a:visited{
    color:#93c5fd;
}

.repeat-loader{
    width:18px;
    height:18px;
    border:2px solid rgba(255,255,255,.25);
    border-top:2px solid #fff;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
}

@keyframes spin{
    from{ transform:rotate(0deg) }
    to{ transform:rotate(360deg) }
}
</style>

</head>
<body>


<div class="panel">

<!-- TOP BAR -->

<div class="tw-card tw-card-compact" style="position:sticky;top:10px;z-index:50;">
<div class="tw-card-body">

<div class="tw-inline-between">

<div class="tw-inline">

<span id="statusDot"
style="width:10px;height:10px;border-radius:50%;background:#aaa;"></span>

<span id="sessionTotal" class="tw-badge tw-badge-basic">
0 ₽
</span>

</div>

<div class="tw-inline">

<label class="tw-switch">
<input type="checkbox" id="afkCheckbox">
<span class="tw-switch-slider"></span>
</label>

<span class="tw-label">AFK</span>

<input id="filterInput"
class="tw-input tw-input-sm"
placeholder="Ник">

<button id="toggleBtn"
class="tw-btn tw-btn-mini">
Pause
</button>

<button id="skipBtn"
class="tw-btn tw-btn-danger tw-btn-mini">
Skip
</button>

</div>

</div>
</div>
</div>


<!-- DONATIONS -->

<div id="donationsList" class="donation-list"></div>


<!-- TEST BAR -->

<div class="tw-card tw-card-compact"
style="position:sticky;bottom:10px">

<div class="tw-card-body">

<div class="tw-inline">

<input id="testUser"
class="tw-input tw-input-sm"
placeholder="Имя">

<input id="testAmount"
class="tw-input tw-input-sm"
type="number"
min="1"
placeholder="Сумма">

<input id="testMessage"
class="tw-input tw-input-sm"
placeholder="Сообщение"
style="flex:1">

<button id="sendTest"
class="tw-btn tw-btn-primary tw-btn-mini">
➕
</button>

</div>

</div>
</div>

</div>


<script>

const list = document.getElementById("donationsList")
const filterInput = document.getElementById("filterInput")

/* LINKIFY */

function linkify(text){

if(!text) return ""

const urlRegex = /(https?:\/\/[^\s]+)/g

return text.replace(
    urlRegex,
    '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
)

}

/* RENDER CARD */

function renderDonation(d, currentId){

let stateClass = ""

if(currentId && d.id === currentId)
    stateClass = "playing"

return `
<div class="tw-card tw-card-compact donation-item ${stateClass}" data-id="${d.id}">
<div class="tw-card-body">

<div class="tw-inline-between">

<div class="tw-inline">

<b class="username">${d.username}</b>

<span class="tw-badge">${d.platform}</span>

<span style="color:#22c55e;font-weight:700">
${d.amount} ₽
</span>

</div>

<button class="tw-btn tw-btn-mini"
id="repeatBtn-${d.id}"
onclick="repeatDonate(${d.id})">
repeat
</button>

</div>

${d.message
? `<div class="donation-message">${linkify(d.message)}</div>`
: ""}

</div>
</div>
`

}

/* UPDATE PLAYING WITHOUT DOM REBUILD */

function updatePlayingState(currentId){

document.querySelectorAll(".donation-item").forEach(el => {

const id = Number(el.dataset.id)

if(currentId && id === currentId){
    el.classList.add("playing")
}else{
    el.classList.remove("playing")
}

})

}

/* REFRESH */

async function refresh(){

const r = await fetch("/client/donate-panel/state")
const data = await r.json()
    if(data.paused){
    toggleBtn.innerText = "Continue"
}else{
    toggleBtn.innerText = "Pause"
}

/* верхняя панель */

document.getElementById("sessionTotal").innerText =
data.session_total + " ₽"

document.getElementById("statusDot").style.background =
data.current ? "#22c55e" : "#aaa"

const currentId = data.current ? data.current.id : null

/* если выделяют текст — не перерисовываем DOM */

const selection = window.getSelection()

if(selection && selection.type === "Range"){
    updatePlayingState(currentId)
    return
}

const filter = filterInput.value.toLowerCase()

let html = ""

data.history.forEach(d => {

if(filter && !d.username.toLowerCase().includes(filter))
    return

html += renderDonation(d, currentId)

})

list.innerHTML = html

}

/* REPEAT */

async function repeatDonate(id){

const btn = document.getElementById("repeatBtn-"+id)

if(!btn) return

/* блокируем кнопку */

btn.disabled = true
btn.innerHTML = `<div class="repeat-loader"></div>`

/* отправляем запрос */

try{

await fetch(
"/client/donate-panel/repeat/"+id,
{method:"POST"}
)

}catch(e){
console.error(e)
}

/* защита от спама — 5 секунд */

setTimeout(()=>{

btn.disabled = false
btn.innerText = "repeat"

},5000)

}

/* BUTTONS */

const toggleBtn = document.getElementById("toggleBtn")

toggleBtn.onclick = async ()=>{

const r = await fetch("/client/donate-panel/pause",{method:"POST"})
const data = await r.json()

if(data.paused){
    toggleBtn.innerText = "Continue"
}else{
    toggleBtn.innerText = "Pause"
}

}


document.getElementById("skipBtn").onclick = async ()=>{

await fetch("/client/donate-panel/skip",{method:"POST"})

}

/* TEST DONATE */

const testUser = document.getElementById("testUser")
const testAmount = document.getElementById("testAmount")
const testMessage = document.getElementById("testMessage")

document.getElementById("sendTest").onclick = async ()=>{

const user = testUser.value
const amount = testAmount.value
const message = testMessage.value

await fetch("/client/donate-panel/send",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
user:user,
amount:amount,
message:message
})
})

testUser.value=""
testAmount.value=""
testMessage.value=""

}

/* EVENTS */

filterInput.addEventListener("input", refresh)

/* LOOP */

setInterval(refresh,2000)

refresh()

</script>

</body>
</html>
