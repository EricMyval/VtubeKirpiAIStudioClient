<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OBS Донаты</title>

    <style>
        /* ===== FIX ДВОЙНОГО СКРОЛЛА ===== */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* ⬅️ ВАЖНО */
            background: #0f0f0f;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* единственный скролл */
        .obs-donations {
            height: 100%;
            overflow-y: auto;
            overscroll-behavior: contain;
            padding: 12px;
            box-sizing: border-box;
            color: #fff;
        }

        .donation-item {
            background: #1f1f1f;
            border: 1px solid #2f2f2f;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .donation-header {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 14px;
        }

        .username { color: #fb7185; font-weight: 800; }
        .amount   { color: #4ade80; font-weight: 700; }
        .date     { color: #9ca3af; font-size: 12px; }

        .donation-message {
            margin-top: 8px;
            padding: 10px;
            background: #262626;
            border-left: 3px solid #facc15;
            border-radius: 6px;
            word-break: break-word;
            font-size: 14px;
        }

        .donation-image {
            margin-top: 10px;
            text-align: center;
        }

        .donation-image img {
            max-width: 220px;
            max-height: 160px;
            border-radius: 6px;
            border: 1px solid #333;
            cursor: pointer;
        }

        .donation-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            border: none;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-show   { background: #22c55e; color: #052e16; }
        .btn-delete { background: #ef4444; color: #fff; }

        .no-donations {
            text-align: center;
            padding: 40px 0;
            color: #9ca3af;
            font-size: 14px;
        }

        .new {
            animation: fadeIn .35s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
<div class="obs-donations" id="donations"></div>

<script>
(() => {
    const PAGE_SIZE = 10;
    const REFRESH_INTERVAL = 4000;

    let shown = [];
    let knownIds = new Set();

    const root = document.getElementById('donations');

    function esc(t){
        const d = document.createElement('div');
        d.textContent = t ?? '';
        return d.innerHTML;
    }

    function card(d, isNew=false){
        const [id, user, msg, amount, image, date] = d;

        return `
        <div class="donation-item ${isNew ? 'new' : ''}" data-id="${id}">
            <div class="donation-header">
                <span class="username">${esc(user)}</span>
                <span class="amount">${amount} ₽</span>
                <span class="date">${date ?? ''}</span>
            </div>

            <div class="donation-message">${esc(msg)}</div>

            ${image ? `
            <div class="donation-image">
                <a href="${image}" target="_blank" rel="noopener">
                    <img src="${image}" loading="lazy">
                </a>
            </div>` : ''}

            <div class="donation-actions">
                <button class="btn btn-show" data-show="${id}">Показать</button>
                <button class="btn btn-delete" data-del="${id}" data-user="${esc(user)}">Удалить</button>
            </div>
        </div>`;
    }

    function render(){
        if (!shown.length){
            root.innerHTML = `<div class="no-donations">📭 Донатов пока нет</div>`;
            bind();
            return;
        }
        root.innerHTML = shown.map(d => card(d)).join('');
        bind();
    }

    async function fetchHead(){
        const r = await fetch(
            `{{ url_for("donations.get_donations_page") }}?page=1&page_size=${PAGE_SIZE}`
        );
        return await r.json();
    }

    async function refresh(){
        try{
            const data = await fetchHead();
            if (!data.success) return;

            const fresh = [];
            for (const d of data.donations || []){
                const id = String(d[0]);
                if (!knownIds.has(id)){
                    knownIds.add(id);
                    fresh.push(d);
                }
            }

            if (fresh.length){
                shown = fresh.concat(shown);
                render();
            }
        }catch(e){}
    }

    function bind(){
        document.querySelectorAll('[data-show]').forEach(b => {
            b.onclick = () => {
                if (!confirm('Показать этот донат в OBS?')) return;
                fetch(
                    `{{ url_for("donations.trigger_donation", donation_id=0, mode="with_image") }}`
                        .replace('0', b.dataset.show)
                );
            };
        });

        document.querySelectorAll('[data-del]').forEach(b => {
            b.onclick = () => {
                if (!confirm(`Удалить донат от ${b.dataset.user}?`)) return;
                fetch(
                    `{{ url_for("donations.delete_donation", donation_id=0) }}`
                        .replace('0', b.dataset.del),
                    { method: 'POST' }
                ).then(() => {
                    shown = shown.filter(x => String(x[0]) !== b.dataset.del);
                    knownIds.delete(b.dataset.del);
                    render();
                });
            };
        });
    }

    fetchHead().then(d => {
        if (!d.success) return;
        shown = d.donations || [];
        knownIds = new Set(shown.map(x => String(x[0])));
        render();
    });

    setInterval(refresh, REFRESH_INTERVAL);
})();
</script>
</body>
</html>
