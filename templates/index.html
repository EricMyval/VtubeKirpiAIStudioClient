<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kirpi Client</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/client-ui.css') }}">

</head>

<body>

<div class="app">

<div class="header">
<div class="title">🖥️ Kirpi Client</div>
<div class="subtitle">Настройки клиента</div>
</div>


<!-- ================= API ================= -->

<div class="card hero">

<div class="hero-header">
<div class="hero-icon">🔑</div>

<div>
<div class="hero-title">API ключ клиента</div>
<div class="hero-sub">
Введите ключ, полученный на сервере
</div>
</div>
</div>

<form method="POST" action="/save-api" class="form">

<label>API ключ</label>

<input
type="text"
name="api_key"
value="{{ api_key }}"
placeholder="Введите API ключ">

<div class="actions">
<button class="btn primary">
💾 Сохранить
</button>
</div>

</form>

</div>



<!-- ================= AUDIO ================= -->

<div class="card">

<div class="hero-header">

<div class="hero-icon">🎧</div>

<div>
<div class="hero-title">Устройство вывода</div>
<div class="hero-sub">
Выберите устройство воспроизведения
</div>
</div>

</div>

<form method="POST" action="/save-audio" class="form">

<label>Доступные устройства</label>

<select name="output_device">

<option value="">-- Выберите устройство --</option>

{% for d in output_devices %}
<option value="{{ d.name }}"
{% if d.name == current_device %}selected{% endif %}>
{{ d.name }}
</option>
{% endfor %}

</select>

<div class="actions">
<button class="btn primary">
💾 Сохранить
</button>
</div>

</form>

</div>



<!-- ================= WIDGETS ================= -->

<div class="card">

<div class="hero-header">

<div class="hero-icon">🧩</div>

<div>
<div class="hero-title">Виджеты OBS</div>
<div class="hero-sub">
Добавьте ссылку в OBS Browser Source
</div>
</div>

</div>


<div class="widget">

<div class="widget-head">

<div class="widget-icon">🔔</div>

<div>
<div class="widget-title">Alerts Widget</div>
<div class="widget-desc">
Донаты, изображения, звук и видео
</div>
</div>

</div>

<div class="widget-url"
data-url="{{ BASE_URL }}/alerts/widget">

{{ BASE_URL }}/alerts/widget

</div>

<div class="widget-actions">

<button class="btn"
onclick="copyWidget(this)">
📋 Copy
</button>

<a href="{{ BASE_URL }}/alerts/widget"
target="_blank"
class="btn primary">
🔗 Open
</a>

</div>

</div>

</div>

</div>


<script>

function copyWidget(btn){

const card = btn.closest(".widget")

const url =
card.querySelector(".widget-url").dataset.url

navigator.clipboard.writeText(url)

btn.innerText="✅ Copied"

setTimeout(()=>{
btn.innerText="📋 Copy"
},1500)

}

</script>

</body>
</html>
