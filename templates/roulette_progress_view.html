<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:transparent;
    overflow:hidden;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.root{
    width:100%;
    height:100%;
    box-sizing:border-box;
    padding:1.2vh 1.6vw;
    display:flex;
    align-items:center;
    justify-content:center;
}

.card{
    width:100%;
    max-width:none;
    padding:0;
    border-radius:999px;
    background:
        linear-gradient(
            180deg,
            rgba(30,35,45,.85),
            rgba(15,18,25,.85)
        );
    border:1px solid rgba(255,255,255,.10);
    box-shadow:
        0 16px 40px rgba(0,0,0,.55),
        inset 0 1px 0 rgba(255,255,255,.06);
    overflow:hidden;
}

.bar{
    position:relative;
    width:100%;
    height:clamp(32px, 7vh, 54px);
}

.fill{
    position:absolute;
    inset:0 auto 0 0;
    width:0%;
    background:
        linear-gradient(
            90deg,
            #4fd1ff,
            #38bdf8,
            #60a5fa
        );
    box-shadow:
        0 0 22px rgba(79,209,255,.45);
    transition:
        width .45s cubic-bezier(.2,.8,.2,1);
}

.fill::after{
    content:"";
    position:absolute;
    inset:0;
    background:
        linear-gradient(
            90deg,
            rgba(255,255,255,.35),
            rgba(255,255,255,0) 40%
        );
    opacity:.25;
}

.label{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
    letter-spacing:.3px;
    font-size:clamp(13px, 2.2vh, 20px);
    color:#ffffff;
    text-shadow:
        0 2px 10px rgba(0,0,0,.65);
    pointer-events:none;
    z-index:2;
}

.bar::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:inherit;
    box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.08);
    pointer-events:none;
}
</style>
</head>
<body>

<div class="root">
    <div class="card">
        <div class="bar">
            <div id="fill" class="fill"></div>
            <div id="label" class="label">—</div>
        </div>
    </div>
</div>

<script>
const fill  = document.getElementById("fill");
const label = document.getElementById("label");

let wasReady = false;

async function load(){

    try{
        const r = await fetch("/overlay/roulette/api/progress", { cache: "no-store" });
        const j = await r.json();

        const left = Number(j.left ?? 0);

        let pct = Number(j.progress ?? 0);
        pct = Math.max(0, Math.min(1, pct));

        const ready = left <= 0;

        // визуальный процент
        const visualPct = ready ? 0 : pct;
        fill.style.width = (visualPct * 100).toFixed(1) + "%";

        // Показываем "Готово" ТОЛЬКО в момент перехода
        if (ready && !wasReady) {

            label.textContent = "Готово к прокрутке";

        } else {

            // обычный режим (даже если бекенд ещё держит left = 0)
            label.textContent =
                "ДО РУЛЕТКИ ОСТАЛОСЬ - " + Math.max(0, left) + " ₽";
        }

        wasReady = ready;

    }catch(e){}
}

setInterval(load, 350);
load();
</script>

</body>
</html>
