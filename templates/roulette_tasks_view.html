<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">

<style>
html, body{
    margin:0;
    padding:0;
    background:transparent;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

/* ============================= */
/* Root container (adaptive)     */
/* ============================= */

.wrapper{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
}

.root{
    box-sizing:border-box;
    width:100%;
    height:100%;
    max-width: min(96vw, 620px);

    padding:1.2vh 1.2vw;

    display:flex;
    flex-direction:column;
    gap:1.1vh;
}

/* ============================= */
/* Task card                     */
/* ============================= */

.task{
    box-sizing:border-box;

    padding:
        clamp(10px, 1.4vh, 18px)
        clamp(14px, 2vw, 22px);

    border-radius: clamp(10px, 1.4vh, 16px);

    background:
        linear-gradient(180deg,#1f1f25,#141418);

    border:1px solid rgba(255,255,255,.08);

    color:#fff;
    font-weight:800;
    line-height:1.15;

    font-size: clamp(14px, 2.1vh, 22px);

    box-shadow:
        0 10px 30px rgba(0,0,0,.45),
        inset 0 1px 0 rgba(255,255,255,.05);

    opacity:1;
    transform:translateY(0) scale(1);

    transition:
        opacity .45s ease,
        transform .45s cubic-bezier(.2,.8,.2,1),
        filter .45s ease;
}

/* появление */
.task.enter{
    opacity:0;
    transform:translateY(12px) scale(.96);
}

/* исчезновение */
.task.leave{
    opacity:0;
    transform:translateY(-10px) scale(.95);
    filter:blur(4px);
}
</style>
</head>
<body>

<div class="wrapper">
    <div id="root" class="root"></div>
</div>

<script>
const root = document.getElementById("root");
const rendered = new Map();

/* ----------------------------- */

function createTaskNode(task){

    const el = document.createElement("div");
    el.className = "task enter";
    el.textContent = task.title;

    requestAnimationFrame(()=>{
        el.classList.remove("enter");
    });

    return el;
}

/* ----------------------------- */

function removeTaskNode(id){

    const el = rendered.get(id);
    if(!el) return;

    el.classList.add("leave");

    setTimeout(()=>{
        el.remove();
        rendered.delete(id);
    }, 450);
}

/* ----------------------------- */

async function load(){

    let data;

    try{
        const r = await fetch("/overlay/roulette/api/tasks");
        data = await r.json();
    }catch(e){
        return;
    }

    const visibleIds = new Set(data.map(t => t.id));

    // удалить те, которых больше нет
    for(const id of rendered.keys()){
        if(!visibleIds.has(id)){
            removeTaskNode(id);
        }
    }

    // добавить новые
    for(const task of data){

        if(rendered.has(task.id))
            continue;

        const node = createTaskNode(task);
        rendered.set(task.id, node);
        root.appendChild(node);
    }
}

setInterval(load, 350);
load();
</script>

</body>
</html>
