<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Roulette overlay</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

/* ============================= */
/* Root                          */
/* ============================= */

.roulette-root{
    width:100%;
    max-width: min(96vw, 1100px);
    height: 200px;
    margin: 0 auto;
    position: relative;

    opacity: 0;
    transform: translateY(12px) scale(.985);
    pointer-events: none;

    transition:
        opacity .45s cubic-bezier(.2,.8,.2,1),
        transform .45s cubic-bezier(.2,.8,.2,1);
}

.roulette-root.visible{
    opacity:1;
    transform: translateY(0) scale(1);
}

/* ============================= */
/* Window                        */
/* ============================= */

.window{
    position:relative;
    width:100%;
    height:140px;
    overflow:hidden;
    border-radius:18px;

    background:
        linear-gradient(180deg,#12141a,#0c0e13);

    border:1px solid rgba(255,255,255,.08);

    box-shadow:
        0 22px 60px rgba(0,0,0,.65),
        inset 0 1px 0 rgba(255,255,255,.04);
}

.window::before{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
        linear-gradient(
            90deg,
            rgba(0,0,0,.55) 0%,
            rgba(0,0,0,0) 20%,
            rgba(0,0,0,0) 80%,
            rgba(0,0,0,.55) 100%
        );
}

/* ============================= */
/* Track                         */
/* ============================= */

.track{
    display:flex;
    height:100%;
    align-items:center;
    transform: translateX(0);
    transition: transform 4s cubic-bezier(.08,.7,.12,1);
}

/* ============================= */
/* Item                          */
/* ============================= */

.item{
    width: 180px;
    min-width: 180px;
    max-width: 180px;

    height: 88px;
    margin: 0 12px;

    padding:0 10px;

    box-sizing: border-box;

    border-radius: 14px;

    background:
        linear-gradient(
            180deg,
            #1c2130,
            #141826
        );

    border:1px solid rgba(255,255,255,.08);

    color:#ffffff;
    font-weight:800;
    font-size:15px;
    letter-spacing:.2px;

    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 14px;

    box-shadow:
        0 12px 32px rgba(0,0,0,.55),
        inset 0 1px 0 rgba(255,255,255,.06);

    flex-shrink:0;

    transition:
        transform .45s ease,
        opacity .45s ease,
        filter .45s ease;
}

/* ============================= */
/* Pointer                       */
/* ============================= */

.pointer{
    position:absolute;
    left:50%;
    top:14px;
    width:2px;
    height:112px;
    transform:translateX(-50%);

    background:
        linear-gradient(
            180deg,
            transparent,
            #38bdf8,
            transparent
        );

    filter:
        drop-shadow(0 0 10px rgba(56,189,248,.9));

    z-index:5;
}

/* ============================= */
/* Winner panel                  */
/* ============================= */

.winner-panel{
    position:absolute;
    inset:0;

    display:flex;
    align-items:center;
    justify-content:center;

    opacity:0;
    pointer-events:none;

    transition:
        opacity .55s cubic-bezier(.2,.8,.2,1),
        transform .55s cubic-bezier(.2,.8,.2,1);

    transform: scale(.96);
}

.winner-panel.show{
    opacity:1;
    transform: scale(1);
}

.winner-box{
    padding:
        clamp(16px,2vh,22px)
        clamp(22px,3vw,36px);

    border-radius:22px;

    background:
        linear-gradient(
            180deg,
            rgba(30,35,55,.85),
            rgba(18,22,35,.85)
        );

    backdrop-filter: blur(12px);

    border:1px solid rgba(255,255,255,.14);

    box-shadow:
        0 28px 90px rgba(0,0,0,.7),
        inset 0 1px 0 rgba(255,255,255,.18);
}

.winner-label{
    text-align:center;
    font-size:12px;
    letter-spacing:.4em;
    font-weight:800;
    opacity:.55;
    margin-bottom:6px;
    color:#c7d2fe;
}

.winner-text{
    font-size: clamp(26px,4.5vw,42px);
    font-weight:900;
    letter-spacing:.2px;
    color:#ffffff;
    text-align:center;

    text-shadow:
        0 10px 40px rgba(0,0,0,.9),
        0 0 22px rgba(56,189,248,.35);
}

/* ============================= */
/* Fade reel                     */
/* ============================= */

.reel-fade .item{
    opacity:0;
    filter: blur(4px);
    transform: scale(.92);
}

</style>
</head>
<body>

<div id="root" class="roulette-root">

    <div class="pointer"></div>

    <div class="window">

        <div id="track" class="track"></div>

        <div id="winnerPanel" class="winner-panel">
            <div class="winner-box">
                <div class="winner-label">WINNER</div>
                <div id="winnerText" class="winner-text"></div>
            </div>
        </div>

    </div>

</div>

<script>
const track        = document.getElementById("track");
const root         = document.getElementById("root");
const winnerPanel  = document.getElementById("winnerPanel");
const winnerText   = document.getElementById("winnerText");

let busy = false;
let realItems = [];
let hideTimer = null;

const spinQueue = [];

/* -------------------------------------------------- */
/* Queue                                              */
/* -------------------------------------------------- */

function enqueueSpin(payload){
    spinQueue.push(payload);
    tryProcessNextSpin();
}

function tryProcessNextSpin(){
    if(busy) return;
    if(spinQueue.length === 0) return;

    const payload = spinQueue.shift();
    startSpinFromPayload(payload);
}

function startSpinFromPayload(payload){
    if(!payload) return;

    const items = payload.items && payload.items.length
        ? payload.items
        : realItems;

    const winIndex = payload.win_index ?? 0;

    spin(items, winIndex);
}

/* -------------------------------------------------- */
/* Audio                                              */
/* -------------------------------------------------- */

let audioCtx = null;

function getAudioCtx(){
    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
}

let tickTimer = null;
let tickStartTime = 0;
let tickDuration = 4000;

function playTick(){

    const ctx = getAudioCtx();
    const t = ctx.currentTime;

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();

    osc.type = "square";
    osc.frequency.value = 1600;

    filter.type = "bandpass";
    filter.frequency.value = 1400;
    filter.Q.value = 8;

    gain.gain.value = 0.0001;

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);

    osc.start(t);
    osc.stop(t + 0.012);

    gain.gain.exponentialRampToValueAtTime(0.025, t + 0.002);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.012);
}

function startSpinSound(){
    stopSpinSound();
    tickStartTime = performance.now();
    scheduleNextTick();
}

function scheduleNextTick(){

    if(!tickStartTime) return;

    const elapsed = performance.now() - tickStartTime;
    const progress = Math.min(elapsed / tickDuration, 1);

    const interval = 140 + Math.pow(progress, 2.1) * 2200;

    playTick();

    if(progress < 1){
        tickTimer = setTimeout(scheduleNextTick, interval);
    }
}

function stopSpinSound(){

    tickStartTime = 0;

    if(tickTimer){
        clearTimeout(tickTimer);
        tickTimer = null;
    }
}

function playWinSound(){

    const ctx = getAudioCtx();
    const now = ctx.currentTime;

    const gain = ctx.createGain();
    gain.gain.value = 0.0001;
    gain.connect(ctx.destination);

    function tone(freq, start, dur){
        const o = ctx.createOscillator();
        o.type = "sine";
        o.frequency.value = freq;
        o.connect(gain);
        o.start(start);
        o.stop(start + dur);
    }

    tone(740,  now,       0.12);
    tone(1110, now + 0.1, 0.18);
    tone(1480, now + 0.22,0.26);

    gain.gain.exponentialRampToValueAtTime(0.05, now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.6);
}

/* -------------------------------------------------- */
/* Spin                                               */
/* -------------------------------------------------- */

function spin(items, winIndex){

    if(busy) return;
    if(!items || !items.length) return;

    busy = true;

    startSpinSound();

    clearTimeout(hideTimer);

    root.classList.add("visible");
    winnerPanel.classList.remove("show");
    winnerText.textContent = "";

    track.classList.remove("reel-fade");

    track.innerHTML = "";
    track.style.transition = "none";
    track.style.transform = "translateX(0px)";

    const reel = [];

    for(let r=0;r<6;r++){
        for(const it of items){
            reel.push(it);
        }
    }

    const baseIndex = (items.length * 3) + winIndex;

    for(const it of reel){
        const div = document.createElement("div");
        div.className = "item";
        div.textContent = it.title;
        track.appendChild(div);
    }

    requestAnimationFrame(() => {

        const itemWidth =
            track.children[0].offsetWidth + 24;

        const center =
            document.querySelector(".window").offsetWidth / 2;

        const targetItemCenter =
            baseIndex * itemWidth + itemWidth / 2;

        const targetX = center - targetItemCenter;

        track.style.transition =
            "transform 4s cubic-bezier(.08,.7,.12,1)";

        track.style.transform =
            `translateX(${targetX}px)`;

        setTimeout(() => {

            stopSpinSound();
            playWinSound();

            track.classList.add("reel-fade");

            const winItem = items[winIndex];

            if(winItem){
                winnerText.textContent = winItem.title;
            }

            setTimeout(() => {
                winnerPanel.classList.add("show");
            }, 260);

            hideTimer = setTimeout(() => {

                const finishedTitle = winnerText.textContent;

                fetch("/overlay/roulette/api/spin-finished", {
                    method: "POST",
                    headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({
                        title: finishedTitle
                    })
                }).catch(()=>{});

                root.classList.remove("visible");
                winnerPanel.classList.remove("show");

                busy = false;
                tryProcessNextSpin();

            }, 5000);

        }, 4100);

    });
}

/* -------------------------------------------------- */
/* Backend вход                                       */
/* -------------------------------------------------- */

window.rouletteSpin = function(payload){
    if(!payload) return;
    enqueueSpin(payload);
};

/* -------------------------------------------------- */
/* Data                                               */
/* -------------------------------------------------- */

async function loadItems(){
    try{
        const r = await fetch("/overlay/roulette/api/items");
        realItems = await r.json();
    }catch(e){
        realItems = [];
    }
}

async function pollSpin(){

    try{
        const r = await fetch("/overlay/roulette/api/next-spin");
        const j = await r.json();

        if(j && j.has){
            window.rouletteSpin(j.payload);
        }

    }catch(e){}

    setTimeout(pollSpin, 350);
}

/* -------------------------------------------------- */

(async function(){
    await loadItems();
    pollSpin();
})();
</script>

</body>
</html>
